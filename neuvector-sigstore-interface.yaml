#nolint:git-checkout-must-use-github-updates,valid-pipeline-git-checkout-tag
package:
  name: neuvector-sigstore-interface
  version: 0_git20260405
  epoch: 3 # GHSA-pmwq-pjrm-6p5r
  description: NeuVector sigstore interface for the SUSE NeuVector Container Security Platform
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 5Gi

environment:
  contents:
    packages:
      - busybox
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/neuvector/sigstore-interface
      expected-commit: 1a7f4140a004ed065451445ed5a6461229a73c10
      depth: -1

  - uses: bump
    with:
      deps: |-
        github.com/sigstore/cosign/v3@v3.0.4
        github.com/sigstore/rekor@v1.5.0
        github.com/sigstore/sigstore@v1.10.4
        github.com/sigstore/timestamp-authority/v2@v2.0.6
        github.com/theupdateframework/go-tuf/v2@v2.4.1
        github.com/in-toto/in-toto-golang@v0.11.0

  - uses: go/build
    with:
      modroot: .
      packages: .
      output: sigstore-interface
      prefix: usr/local
      vendor: true
      go-package: go-1.26

test:
  pipeline:
    - runs: |
        sigstore-interface --help

update:
  manual: true
  exclude-reason: No releases or tags
